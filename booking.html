    <!-- Booking Section -->
    <section class="booking-page">
        <div class="container">
            <h1 class="page-title">احجز موعدك</h1>
            
            <div class="booking-form">
                <h3>نموذج الحجز</h3>
                <form onsubmit="submitBooking(event)">
                    <input type="text" id="name" placeholder="الاسم" required>
                    <input type="tel" id="phone" placeholder="رقم الهاتف" required>
                    <button type="submit" class="btn">تأكيد الحجز</button>
                </form>
                <div id="message" class="message"></div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="social-links">
            <a href="https://wa.me/201094582069" target="_blank"><i class="fab fa-whatsapp"></i></a>

            <a href="https://www.facebook.com/share/1G3VwSP7JD/" target="_blank"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/el__h_a_1_m_o?igsh=Mmdxazd5d3hscTYz" target="_blank"><i class="fab fa-instagram"></i></a>

    <!-- WhatsApp Float -->
    <a href="https://wa.me/201094582069" class="whatsapp-float" target="_blank">

    </a>

    <script>
        function submitBooking(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            
            const bookings = JSON.parse(localStorage.getItem('bookings') || '[]');
            bookings.push({ name, phone, date: new Date().toISOString() });
            localStorage.setItem('bookings', JSON.stringify(bookings));
            
            document.getElementById('message').innerHTML = '<p style="color: #10b981;">✓ تم تأكيد الحجز بنجاح!</p>';
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            
            setTimeout(() => {
                document.getElementById('message').innerHTML = '';
            }, 3000);
        }
    </script>
